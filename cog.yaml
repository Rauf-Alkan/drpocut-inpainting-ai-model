build:
  gpu: true
  system_packages:
    - "ffmpeg"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "wget"
  python_version: "3.11"
  python_requirements: "requirements.txt"
  run:
    - "mkdir -p /src/weights/propainter"
    - "wget -q -O /src/weights/propainter/ProPainter.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/ProPainter.pth"
    - "wget -q -O /src/weights/propainter/raft-things.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/raft-things.pth"
    - "wget -q -O /src/weights/propainter/recurrent_flow_completion.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/recurrent_flow_completion.pth"
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download(repo_id='lixiaowen/diffuEraser', local_dir='/src/weights/diffuEraser')\""
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download(repo_id='runwayml/stable-diffusion-v1-5', local_dir='/src/weights/stable-diffusion-v1-5')\""
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download(repo_id='stabilityai/sd-vae-ft-mse', local_dir='/src/weights/sd-vae-ft-mse')\""

predict: "predict.py:Predictor"